services:
  # ── Backend (FastAPI) ──────────────────────────────────────
  - type: web
    name: meettrack-backend
    runtime: python
    rootDir: MeetTrack-main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # paste Render PostgreSQL internal URL
      - key: SECRET_KEY
        generateValue: true  # auto-generated secure value
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: TRANSCRIBE_BUCKET
        sync: false
      - key: SNS_TOPIC_ARN
        sync: false
      - key: USE_AWS_TRANSCRIBE
        value: "false"
      - key: CORS_ORIGINS
        sync: false          # set to your frontend Render URL after deploy
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: COLAB_WHISPER_URL
        sync: false          # your localtunnel/ngrok URL from Colab

  # ── Frontend (React/Vite) ──────────────────────────────────
  - type: web
    name: meettrack-frontend
    runtime: static
    rootDir: MeetTrack-main/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to your backend Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
