# ── OutcomeX — Local Development docker-compose ───────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your API keys
#   docker compose up --build     # start all services
#   docker compose up backend     # start only backend
#   docker compose down -v        # stop + remove volumes
#
# Services:
#   postgres  — PostgreSQL 16 with pgvector
#   redis     — Redis 7 (broker + result backend)
#   backend   — FastAPI (hot-reload in dev)
#   worker    — Celery worker (all queues)
#   beat      — Celery Beat scheduler
#   flower    — Celery monitoring UI  → http://localhost:5555
#   frontend  — Vite dev server       → http://localhost:5173
#   nginx     — Reverse proxy         → http://localhost:80

version: "3.9"

# ── Shared environment ────────────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL:              postgresql://outcomex:outcomex@postgres:5432/outcomex
  REDIS_URL:                 redis://redis:6379/0
  SECRET_KEY:                ${SECRET_KEY:-dev-secret-change-in-production}
  GEMINI_API_KEY:            ${GEMINI_API_KEY:-}
  OPENAI_API_KEY:            ${OPENAI_API_KEY:-}
  CORS_ORIGINS:              http://localhost:5173,http://localhost:80
  COLAB_API_URL:             ${COLAB_API_URL:-}
  ACTIVEPIECES_WEBHOOK_URL:  ${ACTIVEPIECES_WEBHOOK_URL:-}
  ACTIVEPIECES_SECRET:       ${ACTIVEPIECES_SECRET:-}
  AWS_REGION:                ${AWS_REGION:-ap-south-1}
  AWS_ACCESS_KEY_ID:         ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY:     ${AWS_SECRET_ACCESS_KEY:-}
  SNS_TOPIC_ARN:             ${SNS_TOPIC_ARN:-}
  LLM_CACHE_ENABLED:         "true"
  LLM_CACHE_TTL:             "3600"
  FLOWER_USER:               ${FLOWER_USER:-admin}
  FLOWER_PASSWORD:           ${FLOWER_PASSWORD:-admin}
  GOOGLE_CLIENT_ID:          ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET:      ${GOOGLE_CLIENT_SECRET:-}
  ZOOM_CLIENT_ID:            ${ZOOM_CLIENT_ID:-}
  ZOOM_CLIENT_SECRET:        ${ZOOM_CLIENT_SECRET:-}
  AZURE_CLIENT_ID:           ${AZURE_CLIENT_ID:-}
  AZURE_CLIENT_SECRET:       ${AZURE_CLIENT_SECRET:-}
  NOTION_CLIENT_ID:          ${NOTION_CLIENT_ID:-}
  NOTION_CLIENT_SECRET:      ${NOTION_CLIENT_SECRET:-}
  JIRA_CLIENT_ID:            ${JIRA_CLIENT_ID:-}
  JIRA_CLIENT_SECRET:        ${JIRA_CLIENT_SECRET:-}
  TRELLO_API_KEY:            ${TRELLO_API_KEY:-}
  FRONTEND_URL:              http://localhost:5173
  BACKEND_URL:               http://localhost:8000
  LOG_LEVEL:                 info
  ENVIRONMENT:               development

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: outcomex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     outcomex
      POSTGRES_PASSWORD: outcomex
      POSTGRES_DB:       outcomex
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outcomex -d outcomex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: outcomex-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: outcomex-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - .:/app                          # hot-reload in dev
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: outcomex-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A backend.worker.celery_app worker
      -Q transcription,ai_extraction,email_delivery,analytics,webhooks
      --loglevel=info
      --concurrency=2
    healthcheck:
      test: ["CMD", "celery", "-A", "backend.worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: outcomex-beat
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.worker.celery_app beat --loglevel=info

  # ── Flower ──────────────────────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: outcomex-flower
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A backend.worker.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}

  # ── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: outcomex-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL:      http://localhost:8000
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL:       ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules          # anonymous volume prevents host override
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: outcomex-network
